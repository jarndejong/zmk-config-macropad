CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=n

CONFIG_I2C=y
CONFIG_SSD1306=y
CONFIG_SERIAL=n
CONFIG_SPI=n

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# If OLED test still blank, try building with polling off (less matrix/I2C contention):
# CONFIG_ZMK_KSCAN_MATRIX_POLLING=n

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# OLED — rows 2/3 (pro_micro 0/1) share pins with I2C; see fauxmac.overlay
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=2048

CONFIG_ZMK_HID_INDICATORS=y
