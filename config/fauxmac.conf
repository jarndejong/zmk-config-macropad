# Stage 1: matrix + encoder only
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=n

# D2/D3 are matrix rows; keep I2C driver out of the build for now.
CONFIG_I2C=n
CONFIG_SERIAL=n
CONFIG_SPI=n

# Poll the matrix instead of relying on pin interrupts.
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Optional quality-of-life
CONFIG_ZMK_HID_INDICATORS=y